services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-realty_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-realty_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - apartment-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - apartment-network

  web-panel:
    build:
      context: ./web-panel
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-realty_db}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      BOT_DIAGNOSTICS_URL: ${BOT_DIAGNOSTICS_URL:-http://apartment-bot:8080}
    ports:
      - "3000:3000"
    volumes:
      - web-panel-uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - apartment-network

  apartment-bot:
    build:
      context: ./ApartmentBot
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Diagnostics__Urls: http://0.0.0.0:8080
      WebPanel__BaseUrl: http://web-panel:3000/api
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__ManagerChatId: ${TELEGRAM_MANAGER_CHAT_ID}
      Redis__ConnectionString: redis:6379
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      web-panel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - web-panel-uploads:/shared-uploads
    restart: unless-stopped
    networks:
      - apartment-network

volumes:
  postgres-data:
  redis-data:
  web-panel-uploads:

networks:
  apartment-network:
    driver: bridge
