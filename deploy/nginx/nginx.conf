events {}

http {
    upstream web_panel_upstream {
        server web-panel:3000;
    }

    server {
        listen 80;
        server_name 159.194.209.111 _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name 159.194.209.111 _;

        ssl_certificate     /etc/nginx/certs/web-panel.crt;
        ssl_certificate_key /etc/nginx/certs/web-panel.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        client_max_body_size 20M;

        location / {
            proxy_pass http://web_panel_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
